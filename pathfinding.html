<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pathfinding Visualizer</title>
    <style>
        body {
            background-color: #1E1E1E;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            padding: 20px;
        }

        #controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #357ABD;
        }

        button:disabled {
            background-color: #555555;
            color: #888888;
            cursor: not-allowed;
        }

        #grid-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
        }

        #grid {
            display: grid;
            border: 1px solid #444;
            user-select: none;
        }

        .node {
            width: 25px;
            height: 25px;
            border: 0.1px solid #333;
            background-color: #1E1E1E;
        }

        .node-start {
            background-color: #50E3C2 !important;
        }

        .node-end {
            background-color: #E24A4A !important;
        }

        .node-wall {
            background-color: #444 !important;
        }

        .node-visited {
            animation: visitedAnimation 1.5s ease-out 0s 1 alternate forwards;
        }

        @keyframes visitedAnimation {
            0% { transform: scale(0.3); background-color: rgba(0, 0, 66, 0.75); border-radius: 100%; }
            50% { background-color: rgba(17, 104, 217, 0.75); }
            75% { transform: scale(1.2); background-color: rgba(0, 217, 159, 0.75); }
            100% { transform: scale(1.0); background-color: rgba(0, 190, 218, 0.75); }
        }

        .node-path {
            animation: pathAnimation 0.5s ease-out 0s 1 alternate forwards;
        }

        @keyframes pathAnimation {
            0% { transform: scale(0.6); background-color: #f6e58d; }
            50% { transform: scale(1.2); background-color: #f9ca24; }
            100% { transform: scale(1.0); background-color: #ffbe76; }
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>Pathfinding Visualizer</h1>
        <div id="controls">
            <button onclick="window.location.href='index.html'" style="background-color: #555;">Back to Home</button>
            <button onclick="visualizeBFS()">BFS</button>
            <button onclick="visualizeDFS()">DFS</button>
            <button onclick="clearGrid()">Clear Grid</button>
            <button onclick="clearPath()">Clear Path</button>
        </div>
    </div>

    <div id="grid-container">
        <div id="grid"></div>
    </div>

    <script>
        const ROWS = 25;
        const COLS = 50;
        let START_NODE = [12, 10];
        let END_NODE = [12, 40];
        let isMouseDown = false;
        let grid = [];

        function createGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.style.gridTemplateColumns = `repeat(${COLS}, 25px)`;
            gridElement.style.gridTemplateRows = `repeat(${ROWS}, 25px)`;
            
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    const node = document.createElement('div');
                    node.classList.add('node');
                    node.id = `node-${r}-${c}`;
                    
                    if (r === START_NODE[0] && c === START_NODE[1]) {
                        node.classList.add('node-start');
                    } else if (r === END_NODE[0] && c === END_NODE[1]) {
                        node.classList.add('node-end');
                    }

                    node.addEventListener('mousedown', () => {
                        if (node.classList.contains('node-start') || node.classList.contains('node-end')) return;
                        isMouseDown = true;
                        node.classList.toggle('node-wall');
                    });

                    node.addEventListener('mouseenter', () => {
                        if (!isMouseDown) return;
                        if (node.classList.contains('node-start') || node.classList.contains('node-end')) return;
                        node.classList.add('node-wall');
                    });

                    node.addEventListener('mouseup', () => {
                        isMouseDown = false;
                    });

                    gridElement.appendChild(node);
                    row.push({
                        r, c,
                        isWall: false,
                        isVisited: false,
                        previousNode: null
                    });
                }
                grid.push(row);
            }
        }

        window.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function getNeighbors(node) {
            const neighbors = [];
            const {r, c} = node;
            if (r > 0) neighbors.push(grid[r - 1][c]);
            if (r < ROWS - 1) neighbors.push(grid[r + 1][c]);
            if (c > 0) neighbors.push(grid[r][c - 1]);
            if (c < COLS - 1) neighbors.push(grid[r][c + 1]);
            return neighbors.filter(neighbor => !neighbor.isVisited);
        }

        async function visualizeBFS() {
            clearPath();
            disableControls();
            const startNode = grid[START_NODE[0]][START_NODE[1]];
            const endNode = grid[END_NODE[0]][END_NODE[1]];
            const queue = [startNode];
            startNode.isVisited = true;

            while (queue.length > 0) {
                const currentNode = queue.shift();
                
                if (currentNode === endNode) {
                    await drawPath(endNode);
                    enableControls();
                    return;
                }

                const neighbors = getNeighbors(currentNode);
                for (const neighbor of neighbors) {
                    const element = document.getElementById(`node-${neighbor.r}-${neighbor.c}`);
                    if (element.classList.contains('node-wall')) {
                        neighbor.isVisited = true;
                        continue;
                    }
                    
                    neighbor.isVisited = true;
                    neighbor.previousNode = currentNode;
                    
                    if (neighbor !== endNode) {
                        element.classList.add('node-visited');
                        await sleep(10);
                    }
                    queue.push(neighbor);
                }
            }
            alert("No path found!");
            enableControls();
        }

        async function visualizeDFS() {
            clearPath();
            disableControls();
            const startNode = grid[START_NODE[0]][START_NODE[1]];
            const endNode = grid[END_NODE[0]][END_NODE[1]];
            const stack = [startNode];
            startNode.isVisited = true;

            while (stack.length > 0) {
                const currentNode = stack.pop();
                
                if (currentNode === endNode) {
                    await drawPath(endNode);
                    enableControls();
                    return;
                }

                const neighbors = getNeighbors(currentNode);
                for (const neighbor of neighbors) {
                    const element = document.getElementById(`node-${neighbor.r}-${neighbor.c}`);
                    if (element.classList.contains('node-wall')) {
                        neighbor.isVisited = true;
                        continue;
                    }
                    
                    neighbor.isVisited = true;
                    neighbor.previousNode = currentNode;
                    
                    if (neighbor !== endNode) {
                        element.classList.add('node-visited');
                        await sleep(10);
                    }
                    stack.push(neighbor);
                }
            }
            alert("No path found!");
            enableControls();
        }

        async function drawPath(endNode) {
            let currentNode = endNode;
            const path = [];
            while (currentNode !== null) {
                path.unshift(currentNode);
                currentNode = currentNode.previousNode;
            }
            for (const node of path) {
                const element = document.getElementById(`node-${node.r}-${node.c}`);
                if (!element.classList.contains('node-start') && !element.classList.contains('node-end')) {
                    element.classList.add('node-path');
                    await sleep(30);
                }
            }
        }

        function clearGrid() {
            grid = [];
            document.getElementById('grid').innerHTML = "";
            createGrid();
            enableControls();
        }

        function clearPath() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const node = grid[r][c];
                    node.isVisited = false;
                    node.previousNode = null;
                    const element = document.getElementById(`node-${r}-${c}`);
                    element.classList.remove('node-visited');
                    element.classList.remove('node-path');
                }
            }
        }

        function disableControls() {
            document.querySelectorAll("button").forEach(btn => btn.disabled = true);
        }

        function enableControls() {
            document.querySelectorAll("button").forEach(btn => btn.disabled = false);
        }

        createGrid();
    </script>
</body>
</html>
