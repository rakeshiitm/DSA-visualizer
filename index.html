<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Sorting Visualizer</title>
    <!-- Links to your separate CSS file -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styling for the navigation bar */
        nav { margin-bottom: 20px; }
        nav a { color: #4A90E2; text-decoration: none; font-size: 18px; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #50E3C2; }
    </style>
</head>
<body>

    <!-- The 3-page navigation menu -->
    <nav>
        <a href="index.html">Sorting</a>
        <a href="tree.html">Trees</a>
        <a href="pathfinding.html">Pathfinding</a>
    </nav>

    <h1>Sorting Visualizer</h1>
    
    <div id="controls">
        <div class="slider-container">
            <label for="size-slider">Array Size</label>
            <input type="range" id="size-slider" min="5" max="100" value="15">
        </div>

        <div class="slider-container">
            <label for="speed-slider">Speed</label>
            <input type="range" id="speed-slider" min="1" max="100" value="50">
        </div>

        <button onclick="generateArray()">Generate New Data</button>
        <button onclick="bubbleSort()">Start Bubble Sort</button>
        <button onclick="insertionSort()">Start Insertion Sort</button>
        <button onclick="mergeSort()">Start Merge Sort</button>
        <button onclick="quickSort()">Start Quick Sort</button>
    </div>

    <!-- The visual sorting bars go here -->
    <div id="bar-container"></div>

    <!-- Links to your separate JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
